<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f5f5f7" />
    <meta
      name="description"
      content="一个简洁、实时的浏览器网络速度测试工具。"
    />
    <title>AirSpeed - 网络速度测试</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="#" aria-label="AirSpeed 首页">
        <span class="brand-mark" aria-hidden="true"></span>
        <span>AirSpeed</span>
      </a>
      <p class="header-status">
        <span class="status-dot" id="connectionDot" aria-hidden="true"></span>
        <span id="connectionLabel">等待测试</span>
      </p>
    </header>

    <main>
      <section class="speed-test" aria-labelledby="pageTitle">
        <div class="intro">
          <p class="eyebrow" id="phaseLabel">网络速度测试</p>
          <h1 id="pageTitle">看看你的网络有多快。</h1>
          <p class="subhead" id="helperText">
            一次测试，了解 Ping、下载与上传表现。
          </p>
        </div>

        <div class="meter" id="meter" aria-live="polite">
          <svg class="meter-ring" viewBox="0 0 420 250" aria-hidden="true">
            <defs>
              <linearGradient id="meterGradient" x1="0" y1="0" x2="1" y2="0">
                <stop offset="0%" stop-color="#28c840" />
                <stop offset="52%" stop-color="#0071e3" />
                <stop offset="100%" stop-color="#af52de" />
              </linearGradient>
              <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
                <feGaussianBlur stdDeviation="4" result="blur" />
                <feMerge>
                  <feMergeNode in="blur" />
                  <feMergeNode in="SourceGraphic" />
                </feMerge>
              </filter>
            </defs>
            <path
              class="ring-track"
              d="M 38 212 A 176 176 0 0 1 382 212"
              pathLength="100"
            />
            <path
              class="ring-progress"
              id="ringProgress"
              d="M 38 212 A 176 176 0 0 1 382 212"
              pathLength="100"
            />
            <g class="meter-needle" id="meterNeedle">
              <line x1="210" y1="212" x2="74" y2="212" />
              <circle cx="210" cy="212" r="9" />
            </g>
          </svg>

          <div class="meter-reading">
            <span class="reading-value" id="speedValue">0</span>
            <span class="reading-unit" id="speedUnit">Mbps</span>
          </div>
          <span class="scale-label scale-start">0</span>
          <span class="scale-label scale-mid">100</span>
          <span class="scale-label scale-end">1000+</span>
        </div>

        <div class="metrics" aria-label="测速结果">
          <div class="metric">
            <div class="metric-label">
              <span class="metric-icon latency-icon" aria-hidden="true"></span>
              Ping
            </div>
            <p><span id="latencyValue">--</span><small>ms</small></p>
          </div>
          <div class="metric">
            <div class="metric-label">
              <span class="metric-icon down-icon" aria-hidden="true"></span>
              下载
            </div>
            <p><span id="downloadValue">--</span><small>Mbps</small></p>
            <span class="metric-detail" id="downloadPeak">峰值 --</span>
          </div>
          <div class="metric">
            <div class="metric-label">
              <span class="metric-icon up-icon" aria-hidden="true"></span>
              上传
            </div>
            <p><span id="uploadValue">--</span><small>Mbps</small></p>
            <span class="metric-detail" id="uploadPeak">峰值 --</span>
          </div>
        </div>

        <div class="broadband-estimate" id="broadbandEstimate" hidden>
          <span class="estimate-label">宽带估算</span>
          <strong id="broadbandValue">约 100M 宽带</strong>
          <span class="estimate-note">根据本次下载速度推算</span>
        </div>

        <div class="actions">
          <button class="start-button" id="startButton" type="button">
            <span id="buttonIcon" aria-hidden="true">→</span>
            <span id="buttonLabel">开始测速</span>
          </button>
          <div class="test-mode" aria-label="测试模式">
            <button class="mode-button active" type="button" data-mode="standard">
              标准
            </button>
            <button class="mode-button" type="button" data-mode="lite">
              省流
            </button>
          </div>
          <p class="data-note" id="dataNote">
            最多使用约 760 MB 流量，高速网络会使用更多流量
          </p>
        </div>
      </section>

      <section class="result-band" id="resultBand" aria-labelledby="resultTitle" hidden>
        <div class="result-inner">
          <div>
            <p class="eyebrow">本次结果</p>
            <h2 id="resultTitle">你的网络表现出色。</h2>
          </div>
          <p class="result-copy" id="resultCopy"></p>
          <button class="text-button" id="retestButton" type="button">
            重新测试 <span aria-hidden="true">↗</span>
          </button>
        </div>
      </section>
    </main>

    <footer>
      <p>测速结果会受到设备、Wi-Fi 信号和网络负载影响。</p>
      <p>测试流量由 Cloudflare 边缘网络提供。</p>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
